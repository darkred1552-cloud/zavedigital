<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="100%" stop-color="#1e1e3f"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg5)"/>
  <!-- Diamond shape -->
  <polygon points="200,100 260,170 200,280 140,170" fill="none" stroke="url(#mono)" stroke-width="2.5"/>
  <polygon points="200,120 245,170 200,255 155,170" fill="none" stroke="url(#mono)" stroke-width="1" opacity="0.4"/>
  <!-- Monogram ZD -->
  <text x="200" y="200" text-anchor="middle" font-size="52" font-weight="900" font-family="'Space Grotesk',sans-serif" fill="url(#mono)">ZD</text>
  <!-- Text -->
  <text x="200" y="330" text-anchor="middle" font-size="20" font-weight="600" font-family="'Space Grotesk',sans-serif" fill="white" letter-spacing="5">ZAVE DIGITAL</text>
  <line x1="140" y1="345" x2="260" y2="345" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
</svg>
