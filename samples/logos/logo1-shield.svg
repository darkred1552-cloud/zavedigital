<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="180" r="100" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="180" r="80" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  <path d="M200,80 L270,110 L270,195 Q270,255 200,275 Q130,255 130,195 L130,110 Z" fill="url(#shield)" filter="url(#glow)"/>
  <path d="M200,100 L255,122 L255,190 Q255,240 200,258 Q145,240 145,190 L145,122 Z" fill="none" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="200" y="210" text-anchor="middle" font-size="72" font-weight="900" font-family="'Space Grotesk','Impact',sans-serif" fill="white" filter="url(#glow)">Z</text>
  <text x="200" y="320" text-anchor="middle" font-size="28" font-weight="700" font-family="'Space Grotesk',sans-serif" fill="#a855f7">ZAVE</text>
  <text x="200" y="348" text-anchor="middle" font-size="16" font-weight="400" font-family="'Inter',sans-serif" fill="#06b6d4" letter-spacing="6">DIGITAL</text>
</svg>
