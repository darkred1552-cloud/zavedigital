<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="eidbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="50%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#eidbg)"/>
  <!-- Stars pattern -->
  <circle cx="200" cy="150" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="800" cy="100" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="950" cy="300" r="3" fill="#fbbf24" opacity="0.5"/>
  <circle cx="100" cy="400" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="500" cy="80" r="2" fill="#fbbf24" opacity="0.5"/>
  <!-- Crescent -->
  <circle cx="540" cy="250" r="80" fill="#fbbf24" opacity="0.9"/>
  <circle cx="560" cy="240" r="70" fill="url(#eidbg)"/>
  <!-- Text -->
  <text x="540" y="420" text-anchor="middle" font-size="60" font-weight="900" font-family="serif" fill="#fbbf24">Eid Mubarak!</text>
  <text x="540" y="500" text-anchor="middle" font-size="36" font-weight="400" font-family="serif" fill="white">The Pizza House</text>
  <text x="540" y="560" text-anchor="middle" font-size="24" font-family="sans-serif" fill="rgba(255,255,255,0.7)">Special Eid Menu — Dine-in &amp; Delivery</text>
  <!-- Offer box -->
  <rect x="290" y="620" width="500" height="120" rx="15" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="540" y="675" text-anchor="middle" font-size="28" font-weight="700" font-family="sans-serif" fill="#fbbf24">🎉 20% OFF on Family Deals</text>
  <text x="540" y="715" text-anchor="middle" font-size="18" font-family="sans-serif" fill="rgba(255,255,255,0.8)">Valid till 3rd day of Eid</text>
  <!-- Contact -->
  <text x="540" y="820" text-anchor="middle" font-size="22" font-family="sans-serif" fill="white">📱 +92 319 4051964</text>
  <text x="540" y="860" text-anchor="middle" font-size="18" font-family="sans-serif" fill="rgba(255,255,255,0.6)">DC Chowk, Sargodha Road, Mandi Bahauddin</text>
  <!-- Brand -->
  <rect x="0" y="980" width="1080" height="100" fill="rgba(0,0,0,0.2)"/>
  <text x="540" y="1040" text-anchor="middle" font-size="18" font-weight="600" font-family="sans-serif" fill="#fbbf24">Designed by ZAVE DIGITAL</text>
</svg>
